name: Build and Publish P2 Update Site

# Trigger: push a version tag  →  v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create GitHub Release
      pages: write        # deploy to GitHub Pages
      id-token: write     # OIDC for Pages deployment

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Java 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Determine version from tag or input ────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Maven Tycho build ──────────────────────────────────────────────────
      - name: Build P2 update site with Maven Tycho
        working-directory: eclipse
        run: |
          mvn clean package \
            -Dtycho.version=5.0.0 \
            -DskipTests \
            --batch-mode \
            --no-transfer-progress
        env:
          MAVEN_OPTS: "-Xmx1g"

      # ── Verify output exists ───────────────────────────────────────────────
      - name: Verify P2 repository was generated
        run: |
          ls -la "eclipse/com.gmw.gcts.analyzer.updatesite/target/repository/"
          test -f "eclipse/com.gmw.gcts.analyzer.updatesite/target/repository/content.xml"
          test -f "eclipse/com.gmw.gcts.analyzer.updatesite/target/repository/artifacts.xml"
          echo "P2 repository verified OK"

      # ── Copy P2 site to GitHub Pages staging area ─────────────────────────
      - name: Prepare Pages content
        run: |
          mkdir -p pages/updatesite
          cp -r eclipse/com.gmw.gcts.analyzer.updatesite/target/repository/. pages/updatesite/
          # Add an index.html so the root URL is not a blank 404
          cat > pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>gCTS Task Dependency Analyzer</title></head>
          <body>
            <h2>gCTS Task Dependency Analyzer — Eclipse P2 Update Site</h2>
            <p>Install via Eclipse:</p>
            <pre>Help → Install New Software → Add → https://&lt;org&gt;.github.io/&lt;repo&gt;/updatesite</pre>
            <p><a href="updatesite/">Browse update site</a></p>
          </body>
          </html>
          EOF

      # ── Upload Pages artifact ──────────────────────────────────────────────
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      # ── Deploy to GitHub Pages ─────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Package plugin JAR for GitHub Release ─────────────────────────────
      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp eclipse/com.gmw.gcts.analyzer.updatesite/target/repository/plugins/com.gmw.gcts.analyzer_*.jar \
             release-artifacts/ 2>/dev/null || true
          # Also zip the full P2 repository for offline installs
          cd eclipse/com.gmw.gcts.analyzer.updatesite/target/repository
          zip -r "../../../../release-artifacts/gcts-analyzer-p2-${{ steps.version.outputs.version }}.zip" .
          echo "Release artifacts:"
          ls -lh ../../../../release-artifacts/

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          name: "gCTS Dependency Analyzer v${{ steps.version.outputs.version }}"
          body: |
            ## gCTS Task Dependency Analyzer v${{ steps.version.outputs.version }}

            ### Install via Eclipse P2 Update Site
            ```
            Help → Install New Software → Add
            URL: ${{ steps.deployment.outputs.page_url }}updatesite
            ```

            ### Install via Dropins (offline)
            Download the JAR and copy to your Eclipse `dropins/` folder, then restart with `-clean`.

            ### What's included
            - ABAP class `ZCL_GCTS_TR_ANALYZER` — 4-stage XCO analysis pipeline
            - ICF service `ZGCTS_ANALYZE_HANDLER` — REST endpoint at `/sap/bc/zgcts/analyze`
            - Eclipse plugin with dedicated Dependency Analysis view
            - Supported types: CLAS, INTF, TABL, DTEL, DDLS, DDLX, BDEF, FUGR
            - Conflict detection (CRITICAL), dependency clustering, pull-order recommendation
          files: release-artifacts/*
          draft: false
          prerelease: false
